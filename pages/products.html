<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Products Page</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background-color: #dcdcdc;
    }

    /* HEADER */
    .header {
        background-color: red;
        color: black;
        text-align: center;
        padding: 20px;
        font-size: 50px;
        font-weight: bold;
    }

    /* NAVBAR */
    .navbar {
        background-color: black;
        color: white;
        text-align: center;
        padding: 15px;
    }

    .navbar a {
        color: white;
        text-decoration: none;
        margin: 0 10px;
    }

    .navbar a:hover {
        text-decoration: underline;
    }

    /* SECTION TITLE */
    .section-title {
        font-size: 28px;
        margin: 20px;
        font-weight: bold;
    }

    /* PRODUCT GRID */
    .products {
        display: flex;
        justify-content: space-around;
        flex-wrap: wrap;
        padding: 10px;
    }

    .product-card {
        background-color: white;
        border: 3px solid black;
        width: 18%;
        text-align: center;
        padding: 10px;
        margin-bottom: 20px;
        position: relative;
    }

    .product-card img {
        width: 100%;
        height: 200px;
        object-fit: contain;
    }

    /* WARRANTY BADGE */
    .badge {
        position: absolute;
        top: 5px;
        right: 5px;
        background-color: gold;
        padding: 5px;
        font-size: 12px;
        font-weight: bold;
        border-radius: 5px;
    }

    /* BUTTON */
    .buy-btn {
        margin-top: 10px;
        padding: 10px 20px;
        background-color: red;
        border: none;
        border-radius: 20px;
        cursor: pointer;
    }

    .buy-btn:hover {
        background-color: darkred;
    }

    /* DISCOVER SECTION */
    .discover {
        text-align: center;
        margin-top: 20px;
    }

    .categories {
        display: flex;
        justify-content: center;
        gap: 30px;
        margin-top: 10px;
    }

    .category {
        text-align: center;
    }

    .category img {
        width: 120px;
        height: 120px;
        border: 3px solid black;
        background-color: white;
    }

    /* FOOTER */
    .footer {
        background-color: black;
        height: 60px;
        margin-top: 20px;
    }
</style>

</head>

<body>

<!-- HEADER -->
<div class="header">Products</div>

<!-- NAVBAR -->
<div class="navbar">
    <a href="#">Home</a> |
    <a href="#">Products</a> |
    <a href="#">Blog</a> |

    <a href="#">About</a> |
    <a href="#">FAQs</a> |

    <div class="product-card">

    <div class="product-card">

    <div class="product-card">

</div>

<!-- DISCOVER MORE -->

</body>
