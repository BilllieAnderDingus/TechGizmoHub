<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Offers</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #dcdcdc;
        }

        /* Header */
        .header {
            background-color: red;
            text-align: center;
            padding: 30px 0;
        }

        .header h1 {
            color: black;
            font-size: 60px;
            text-shadow: 3px 3px 0 white;
            margin: 0;
        }

        /* Navbar */
        .navbar {
            background-color: black;
            padding: 10px;
            text-align: center;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            margin: 0 10px;
            font-size: 18px;
        }

        .navbar a:hover {
            text-decoration: underline;
        }

        /* Content */
        .container {
            padding: 30px;
        }

        .title {
            font-weight: bold;
            font-size: 22px;
            margin-bottom: 30px;
        }

        .offer {
            display: flex;
            align-items: center;
            margin-bottom: 50px;
        }

        .offer img {
            width: 150px;
            margin-right: 30px;
        }

        .offer-text {
            font-size: 20px;
        }

        .games {
            position: absolute;
            right: 100px;
            top: 250px;
        }

        .games img {
            width: 200px;
            margin-left: -40px;
        }

        /* Footer */
        .footer {
            background-color: black;
            height: 50px;
            margin-top: 50px;
        }
    </style>
</head>
<body>

    <!-- Header -->
    <div class="header">
        <h1>Offers</h1>
    </div>

    <!-- Navbar -->
    <div class="navbar">
        <a href="#">Home</a> |
        <a href="#">Products</a> |
        <a href="#">Blog</a> |
        <a href="#">Offers</a> |
        <a href="#">About</a> |
        <a href="#">FAQs</a> |
        <a href="#">Services</a> |
        <a href="#">Reviews</a> |
        <a href="#">External Links</a> |
        <a href="#">Contact</a>
    </div>

    <!-- Main Content -->
    <div class="container">
        <div class="title">POPULAR OFFERS !</div>

        <!-- PS5 Offer -->
        <div class="offer">
            <img src="/assets/images/ps5-console-png-ylf-uz1mld99hjkwi474.png" alt="PS5">
            <div class="offer-text">
                <p>Buy a PS5...</p>
                <p>Get two games FREE of YOUR CHOICE!</p>
            </div>
        </div>

        <!-- Phone Offer -->
        <div class="offer">
            <img src="/assets/images/iPhone-17-Pro-Max-Orange-PNG.png" alt="Phone">
            <div class="offer-text">
                <p>Buy a Phone...</p>
                <p>Get a screen protector and clear case for FREE !</p>
            </div>
        </div>
    </div>

    <!-- Games Images -->
    <div class="games">
        <img src="/assets/images/minecraf.jpg" alt="Game 1">
        <img src="/assets/images/spiderman.jpg" alt="Game 2">
    </div>

    <!-- Footer -->
    <div class="footer"></div>

</body>
</html>
